name: Deploy Theme

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '.github/workflows/deploy.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v4
      
    - name: Show commit info
      run: |
        echo "Date: ${{ github.event.head_commit.timestamp }}"
        echo "Message: ${{ github.event.head_commit.message }}"
      
    - name: Install SSH key
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Add server to known_hosts
      run: |
        ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

    - name: Ensure directory exists
      run: |
        ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
        "mkdir -p /home/${{ secrets.SSH_USER }}/${{ secrets.THEME_PATH }}"

    - name: Sync Theme Directory
      run: |
        rsync -avz \
        --delete \
        --exclude='.github/workflows/deploy.yml' \
        --exclude='readme.txt' \
        ./ \
        ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:/home/${{ secrets.SSH_USER }}/${{ secrets.THEME_PATH }}